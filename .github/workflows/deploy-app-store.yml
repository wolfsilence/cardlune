
name: 🚀 Deploy to App Store Connect

on:
  workflow_dispatch:

  push:
    tags:
      - 'release-*'

concurrency:
  group: appstore-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Rename → Compile Check → Deploy
    runs-on: macos-latest

    env:
      TEAM_ID:        "262TL285Q2"
      EXPORT_DIR:     ./build
      EXPORT_OPTIONS: ./ExportOptions.plist

      # ★★★ 换项目名和包名只改下面两行 ★★★
      PROJECT_NAME:   "CardeluneTest"
      BUNDLE_ID:      "com.CardeluneTest"

    steps:
      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      # 1. Checkout
      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      - name: 📥 Checkout
        uses: actions/checkout@v4

      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      # 2. Select latest Xcode
      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      - name: 🔧 Select Xcode (iOS 26 SDK)
        run: |
          LATEST=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Picked: $LATEST"
          sudo xcode-select -switch "$LATEST"
          echo "Xcode $(xcodebuild -version | head -1)"
          echo "iOS SDK $(xcrun --sdk iphoneos --show-sdk-version)"

      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      # 3. 重命名项目 → 编译验证 → 失败则终止
      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      - name: 🔄 Rename Project & Compile Check
        run: |
          echo "═════════════════════════════════════"
          echo "  🔄 重命名项目"
          echo "═════════════════════════════════════"

          # 找出原来的项目名（用 find 避免 ls 通配符问题）
          OLD_NAME=$(find . -maxdepth 1 -name '*.xcodeproj' -type d | head -1 | sed 's|^\./||; s|\.xcodeproj$||')
          echo "原项目名: $OLD_NAME"
          echo "新项目名: $PROJECT_NAME"
          echo "新 Bundle: $BUNDLE_ID"

          if [ "$OLD_NAME" = "$PROJECT_NAME" ]; then
            echo "项目名未变，跳过重命名"
          else
            # 1) 重命名源文件夹
            if [ -d "$OLD_NAME" ]; then
              mv "$OLD_NAME" "$PROJECT_NAME"
              echo "✅ 文件夹: $OLD_NAME → $PROJECT_NAME"
            fi

            # 2) 重命名 .xcodeproj
            mv "${OLD_NAME}.xcodeproj" "${PROJECT_NAME}.xcodeproj"
            echo "✅ xcodeproj: ${OLD_NAME}.xcodeproj → ${PROJECT_NAME}.xcodeproj"

            # 3) 替换 project.pbxproj 中所有旧项目名
            PBXPROJ="${PROJECT_NAME}.xcodeproj/project.pbxproj"
            sed -i '' "s/${OLD_NAME}/${PROJECT_NAME}/g" "$PBXPROJ"
            echo "✅ pbxproj 内引用全部替换"
          fi

          PBXPROJ="${PROJECT_NAME}.xcodeproj/project.pbxproj"

          # --- 修改 Bundle ID（仅不同时替换）---
          OLD_BUNDLE=$(grep -m1 'PRODUCT_BUNDLE_IDENTIFIER = ' "$PBXPROJ" | sed 's/.*PRODUCT_BUNDLE_IDENTIFIER = \(.*\);/\1/')
          if [ "$OLD_BUNDLE" = "$BUNDLE_ID" ]; then
            echo "Bundle ID 未变，跳过"
          else
            sed -i '' "s/PRODUCT_BUNDLE_IDENTIFIER = [^;]*;/PRODUCT_BUNDLE_IDENTIFIER = $BUNDLE_ID;/g" "$PBXPROJ"
            echo "✅ Bundle ID: $OLD_BUNDLE → $BUNDLE_ID"
          fi

          # --- Build Number ---
          BUILD_NUMBER=${{ github.run_number }}
          sed -i '' "s/CURRENT_PROJECT_VERSION = [0-9]*;/CURRENT_PROJECT_VERSION = $BUILD_NUMBER;/g" "$PBXPROJ"

          echo ""
          echo "修改后配置:"
          grep -E 'PRODUCT_BUNDLE_IDENTIFIER|PRODUCT_NAME|CURRENT_PROJECT_VERSION|name = |productName = |path = ' "$PBXPROJ" | sort -u | head -10

          echo ""
          echo "═════════════════════════════════════"
          echo "  🔨 编译验证"
          echo "═════════════════════════════════════"

          xcodebuild build \
            -scheme "$PROJECT_NAME" \
            -destination 'generic/platform=iOS' \
            -quiet

          echo ""
          echo "✅ 编译通过！继续打包上传..."

      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      # 4. Setup ASC credentials & ExportOptions
      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      - name: 🔑 Setup App Store Connect
        env:
          ASC_API_KEY:   ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          ASC_KEY_ID:    ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          mkdir -p ~/private_keys
          echo "$ASC_API_KEY" > ~/private_keys/AuthKey_${ASC_KEY_ID}.p8
          chmod 600 ~/private_keys/AuthKey_${ASC_KEY_ID}.p8

          cat > $EXPORT_OPTIONS << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>262TL285Q2</string>
              <key>uploadSymbols</key>
              <true/>
              <key>uploadBitcode</key>
              <false/>
              <key>manageAppVersionAndBuildNumber</key>
              <false/>
          </dict>
          </plist>
          PLIST

          echo "✅ ASC credentials ready"

      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      # 5. Archive
      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      - name: 📦 Archive
        env:
          ASC_KEY_ID:    ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          ARCHIVE_PATH="./build/${PROJECT_NAME}.xcarchive"

          xcodebuild archive \
            -scheme "$PROJECT_NAME" \
            -archivePath "$ARCHIVE_PATH" \
            -destination 'generic/platform=iOS' \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"

          echo "✅ Archive done"

      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      # 6. Export IPA
      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      - name: 📤 Export IPA
        env:
          ASC_KEY_ID:    ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          xcodebuild -exportArchive \
            -archivePath "./build/${PROJECT_NAME}.xcarchive" \
            -exportPath "$EXPORT_DIR" \
            -exportOptionsPlist "$EXPORT_OPTIONS" \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"

          echo "✅ IPA exported → $(ls -lh $EXPORT_DIR/*.ipa)"

      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      # 7. Upload to App Store Connect
      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      - name: ☁️ Upload to App Store Connect
        env:
          ASC_KEY_ID:    ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          IPA_FILE=$(ls $EXPORT_DIR/*.ipa | head -1)

          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_FILE" \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID" \
            --verbose

          echo ""
          echo "══════════════════════════════════════════════"
          echo "  上传完成！去 App Store Connect 手动提审。"
          echo "  项目名: $PROJECT_NAME"
          echo "  Bundle: $BUNDLE_ID"
          echo "  Build #${{ github.run_number }}"
          echo "══════════════════════════════════════════════"
