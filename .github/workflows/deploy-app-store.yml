name: 🚀 Deploy to App Store Connect

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App 名称（显示在手机上的名字）'
        type: string
        required: false
        default: 'Cardelune'

      bundle_id:
        description: 'Bundle ID（如 com.xxx.yyy）'
        type: string
        required: false
        default: 'com.Cardelune'

  push:
    tags:
      - 'release-*'

concurrency:
  group: appstore-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Modify → Compile Check → Deploy
    runs-on: macos-latest

    env:
      SCHEME:         Cardelune
      ARCHIVE_PATH:   ./build/Cardelune.xcarchive
      EXPORT_DIR:     ./build
      EXPORT_OPTIONS: ./ExportOptions.plist
      TEAM_ID:        "262TL285Q2"

    steps:
      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      # 1. Checkout
      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      - name: 📥 Checkout
        uses: actions/checkout@v4

      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      # 2. Select latest Xcode
      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      - name: 🔧 Select Xcode (iOS 26 SDK)
        run: |
          LATEST=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Picked: $LATEST"
          sudo xcode-select -switch "$LATEST"
          echo "Xcode $(xcodebuild -version | head -1)"
          echo "iOS SDK $(xcrun --sdk iphoneos --show-sdk-version)"

      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      # 3. 修改工程 → 编译验证 → 失败则终止
      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      - name: 🔄 Modify & Compile Check
        env:
          NEW_APP_NAME:  ${{ github.event.inputs.app_name || 'Cardelune' }}
          NEW_BUNDLE_ID: ${{ github.event.inputs.bundle_id || 'com.Cardelune' }}
        run: |
          PBXPROJ="Cardelune.xcodeproj/project.pbxproj"

          echo "═════════════════════════════════════"
          echo "  🔄 修改工程配置"
          echo "═════════════════════════════════════"
          echo "App Name : $NEW_APP_NAME"
          echo "Bundle ID: $NEW_BUNDLE_ID"

          # --- Bundle ID ---
          sed -i '' "s/PRODUCT_BUNDLE_IDENTIFIER = [^;]*;/PRODUCT_BUNDLE_IDENTIFIER = $NEW_BUNDLE_ID;/g" "$PBXPROJ"

          # --- App Name ---
          sed -i '' "s/PRODUCT_NAME = \"[^\"]*\";/PRODUCT_NAME = \"$NEW_APP_NAME\";/g" "$PBXPROJ"

          # --- Build Number ---
          BUILD_NUMBER=${{ github.run_number }}
          sed -i '' "s/CURRENT_PROJECT_VERSION = [0-9]*;/CURRENT_PROJECT_VERSION = $BUILD_NUMBER;/g" "$PBXPROJ"

          echo ""
          echo "修改后的配置:"
          grep -E 'PRODUCT_BUNDLE_IDENTIFIER|PRODUCT_NAME|CURRENT_PROJECT_VERSION' "$PBXPROJ" | sort -u

          echo ""
          echo "═════════════════════════════════════"
          echo "  🔨 编译验证 (xcodebuild build)"
          echo "═════════════════════════════════════"

          xcodebuild build \
            -scheme "$SCHEME" \
            -destination 'generic/platform=iOS' \
            -quiet

          echo ""
          echo "✅ 编译通过！继续打包上传..."

      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      # 4. Setup ASC credentials & ExportOptions
      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      - name: 🔑 Setup App Store Connect
        env:
          ASC_API_KEY:   ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          ASC_KEY_ID:    ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          mkdir -p ~/private_keys
          echo "$ASC_API_KEY" > ~/private_keys/AuthKey_${ASC_KEY_ID}.p8
          chmod 600 ~/private_keys/AuthKey_${ASC_KEY_ID}.p8

          cat > $EXPORT_OPTIONS << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>262TL285Q2</string>
              <key>uploadSymbols</key>
              <true/>
              <key>uploadBitcode</key>
              <false/>
              <key>manageAppVersionAndBuildNumber</key>
              <false/>
          </dict>
          </plist>
          PLIST

          echo "✅ ASC credentials ready"

      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      # 5. Archive
      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      - name: 📦 Archive
        env:
          ASC_KEY_ID:    ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          xcodebuild archive \
            -scheme "$SCHEME" \
            -archivePath "$ARCHIVE_PATH" \
            -destination 'generic/platform=iOS' \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"

          echo "✅ Archive done"

      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      # 6. Export IPA
      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      - name: 📤 Export IPA
        env:
          ASC_KEY_ID:    ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_DIR" \
            -exportOptionsPlist "$EXPORT_OPTIONS" \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"

          echo "✅ IPA exported → $(ls -lh $EXPORT_DIR/*.ipa)"

      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      # 7. Upload to App Store Connect
      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      - name: ☁️ Upload to App Store Connect
        env:
          ASC_KEY_ID:    ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          IPA_FILE=$(ls $EXPORT_DIR/*.ipa | head -1)

          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_FILE" \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID" \
            --verbose

          echo ""
          echo "══════════════════════════════════════════════"
          echo "  上传完成！去 App Store Connect 手动提审。"
          echo "  Bundle: ${{ github.event.inputs.bundle_id || 'com.Cardelune' }}"
          echo "  Build #${{ github.run_number }}"
          echo "══════════════════════════════════════════════"
