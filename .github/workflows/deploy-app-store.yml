name: 🚀 Deploy to App Store Connect

on:
  workflow_dispatch:
    inputs:
      submit_for_review:
        description: '上传后自动提交审核'
        type: boolean
        required: false
        default: false

  push:
    tags:
      - 'release-*'          # 推送 release-x.y.z 的 tag 自动触发（仅上传，不提审）

concurrency:
  group: appstore-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Archive → Upload → Submit
    runs-on: macos-15

    env:
      SCHEME:          Cardelune
      ARCHIVE_PATH:    ./build/Cardelune.xcarchive
      EXPORT_DIR:      ./build
      EXPORT_OPTIONS:  ./ExportOptions.plist
      TEAM_ID:         "262TL285Q2"
      BUNDLE_ID:       "com.Cardelune"

    steps:
      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      # 1. Checkout
      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      - name: 📥 Checkout
        uses: actions/checkout@v4

      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      # 2. Setup Xcode
      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      - name: 🔧 Select Xcode
        run: |
          sudo xcode-select -switch /Applications/Xcode.app
          echo "Xcode $(xcodebuild -version | head -1)"
          echo "SDK $(xcrun --show-sdk-version)"

      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      # 3. Setup ASC API Key & ExportOptions
      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      - name: 🔑 Setup App Store Connect Authentication
        env:
          ASC_API_KEY:   ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          ASC_KEY_ID:    ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          # 写入 .p8 私钥文件
          mkdir -p ~/private_keys
          echo "$ASC_API_KEY" > ~/private_keys/AuthKey_${ASC_KEY_ID}.p8
          chmod 600 ~/private_keys/AuthKey_${ASC_KEY_ID}.p8

          # 写入 ExportOptions.plist
          cat > $EXPORT_OPTIONS << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>262TL285Q2</string>
              <key>uploadSymbols</key>
              <true/>
              <key>uploadBitcode</key>
              <false/>
              <key>manageAppVersionAndBuildNumber</key>
              <false/>
          </dict>
          </plist>
          PLIST

          echo "✅ API Key & ExportOptions ready"

      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      # 4. Bump Build Number
      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      - name: 🔢 Set Build Number
        run: |
          BUILD_NUMBER=${{ github.run_number }}
          echo "BUILD=$BUILD_NUMBER"

          # 修改 project.pbxproj 中的 CURRENT_PROJECT_VERSION
          sed -i '' "s/CURRENT_PROJECT_VERSION = [0-9]*;/CURRENT_PROJECT_VERSION = $BUILD_NUMBER;/g" \
            Cardelune.xcodeproj/project.pbxproj

          echo "✅ Build number → $BUILD_NUMBER"

      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      # 5. Archive
      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      - name: 📦 Archive
        env:
          ASC_KEY_ID:    ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          xcodebuild archive \
            -scheme "$SCHEME" \
            -archivePath "$ARCHIVE_PATH" \
            -destination 'generic/platform=iOS' \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"

          echo "✅ Archive done"

      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      # 6. Export IPA
      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      - name: 📤 Export IPA
        env:
          ASC_KEY_ID:    ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_DIR" \
            -exportOptionsPlist "$EXPORT_OPTIONS" \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"

          echo "✅ IPA exported → $(ls -lh $EXPORT_DIR/*.ipa)"

      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      # 7. Upload to App Store Connect
      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      - name: ☁️ Upload to App Store Connect
        env:
          ASC_KEY_ID:    ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          IPA_FILE=$(ls $EXPORT_DIR/*.ipa | head -1)

          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_FILE" \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID" \
            --verbose

          echo "✅ Upload complete"

      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      # 8. Wait for Build Processing
      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      - name: ⏳ Wait for Build Processing
        if: ${{ github.event.inputs.submit_for_review == 'true' }}
        env:
          ASC_KEY_ID:    ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          ASC_API_KEY:   ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          # 安装 PyJWT（如果还没有）
          pip3 install --quiet PyJWT 2>/dev/null || true

          # 生成 JWT
          JWT=$(python3 .github/scripts/generate-jwt.py \
            "$ASC_KEY_ID" \
            "$ASC_ISSUER_ID" \
            "$ASC_API_KEY")

          APP_ID=$(curl -s -X GET \
            "https://api.appstoreconnect.apple.com/v1/apps?filter[bundleId]=$BUNDLE_ID" \
            -H "Authorization: Bearer $JWT" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['data'][0]['id'])")
          echo "App ID: $APP_ID"

          # 轮询等待 build 处理完成
          echo "⏳ Waiting for build to finish processing..."
          for i in $(seq 1 60); do
            BUILD_STATE=$(curl -s -X GET \
              "https://api.appstoreconnect.apple.com/v1/builds?filter[app]=$APP_ID&sort=-version&limit=1" \
              -H "Authorization: Bearer $JWT" \
              | python3 -c "
          import sys, json
          try:
              data = json.load(sys.stdin)
              build = data['data'][0]
              print(build['attributes']['processingState'])
          except:
              print('NOT_FOUND')
          ")

            echo "[$i/60] Build state: $BUILD_STATE"

            if [ "$BUILD_STATE" = "VALID" ]; then
              echo "✅ Build processing complete!"
              break
            elif [ "$BUILD_STATE" = "INVALID" ]; then
              echo "❌ Build processing failed!"
              exit 1
            fi

            sleep 30
          done

      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      # 9. Submit for Review
      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      - name: ✅ Submit for Review
        if: ${{ github.event.inputs.submit_for_review == 'true' }}
        env:
          ASC_KEY_ID:    ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          ASC_API_KEY:   ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          MARKETING_VERSION: "1.0"
        run: |
          JWT=$(python3 .github/scripts/generate-jwt.py \
            "$ASC_KEY_ID" \
            "$ASC_ISSUER_ID" \
            "$ASC_API_KEY")

          APP_ID=$(curl -s -X GET \
            "https://api.appstoreconnect.apple.com/v1/apps?filter[bundleId]=$BUNDLE_ID" \
            -H "Authorization: Bearer $JWT" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['data'][0]['id'])")
          echo "App ID: $APP_ID"

          # 获取最新的 VALID build ID
          BUILD_ID=$(curl -s -X GET \
            "https://api.appstoreconnect.apple.com/v1/builds?filter[app]=$APP_ID&filter[processingState]=VALID&sort=-version&limit=1" \
            -H "Authorization: Bearer $JWT" \
            | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          build = data['data'][0]
          print(build['id'])
          ")
          echo "Build ID: $BUILD_ID"

          # 查找 / 创建 App Store Version
          VERSION_ID=$(curl -s -X GET \
            "https://api.appstoreconnect.apple.com/v1/appStoreVersions?filter[app]=$APP_ID&filter[versionString]=$MARKETING_VERSION&filter[platform]=IOS&limit=1" \
            -H "Authorization: Bearer $JWT" \
            | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          if data['data']:
              print(data['data'][0]['id'])
          else:
              print('')
          ")

          if [ -z "$VERSION_ID" ]; then
            echo "📝 Creating new App Store Version $MARKETING_VERSION..."
            VERSION_ID=$(curl -s -X POST \
              "https://api.appstoreconnect.apple.com/v1/appStoreVersions" \
              -H "Authorization: Bearer $JWT" \
              -H "Content-Type: application/json" \
              -d "{
                \"data\": {
                  \"type\": \"appStoreVersions\",
                  \"attributes\": {
                    \"platform\": \"IOS\",
                    \"versionString\": \"$MARKETING_VERSION\",
                    \"releaseType\": \"MANUAL\"
                  },
                  \"relationships\": {
                    \"app\": {
                      \"data\": {
                        \"type\": \"apps\",
                        \"id\": \"$APP_ID\"
                      }
                    }
                  }
                }
              }" \
              | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['id'])")
          fi
          echo "App Store Version ID: $VERSION_ID"

          # 关联 Build 到 App Store Version
          echo "🔗 Attaching build to version..."
          curl -s -X PATCH \
            "https://api.appstoreconnect.apple.com/v1/appStoreVersions/$VERSION_ID/relationships/build" \
            -H "Authorization: Bearer $JWT" \
            -H "Content-Type: application/json" \
            -d "{
              \"data\": {
                \"type\": \"builds\",
                \"id\": \"$BUILD_ID\"
              }
            }"

          # 提交审核
          echo "🚀 Creating submission..."
          SUBMISSION=$(curl -s -X POST \
            "https://api.appstoreconnect.apple.com/v1/appStoreVersionSubmissions" \
            -H "Authorization: Bearer $JWT" \
            -H "Content-Type: application/json" \
            -d "{
              \"data\": {
                \"type\": \"appStoreVersionSubmissions\",
                \"relationships\": {
                  \"appStoreVersion\": {
                    \"data\": {
                      \"type\": \"appStoreVersions\",
                      \"id\": \"$VERSION_ID\"
                    }
                  }
                }
              }
            }")
          echo "$SUBMISSION" | python3 -m json.tool

          echo ""
          echo "🎉 =============================================="
          echo "   Build uploaded & submitted for review!"
          echo "   Bundle: $BUNDLE_ID"
          echo "   Version: $MARKETING_VERSION"
          echo "   Build #${{ github.run_number }}"
          echo "   =============================================="
